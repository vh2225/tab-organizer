<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Monochrome line-icon sprite (stroke inherits currentColor via CSS) -->
  <svg width="0" height="0" class="sprite" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-group" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></symbol>
      <symbol id="i-windows" viewBox="0 0 24 24"><rect x="2.5" y="5" width="13" height="10" rx="1.5"/><path d="M8.5 19h11a1.5 1.5 0 0 0 1.5-1.5V9"/></symbol>
      <symbol id="i-sort" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/></symbol>
      <symbol id="i-dedupe" viewBox="0 0 24 24"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
      <symbol id="i-save" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></symbol>
      <symbol id="i-ungroup" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
      <symbol id="i-undo" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></symbol>
      <symbol id="i-ai" viewBox="0 0 24 24"><path d="M12 3l1.7 4.8L18.5 9.5 13.7 11.2 12 16l-1.7-4.8L5.5 9.5l4.8-1.7z"/><path d="M19 14l.6 1.7 1.9.6-1.9.6-.6 1.7-.6-1.7-1.9-.6 1.9-.6z"/></symbol>
    </defs>
  </svg>

  <header>
    <div class="brand">
      <h1>Smart Organizer</h1>
      <button id="settingsLink" class="icon-btn" title="Settings" aria-label="Settings">
        <svg class="ico"><use href="#i-settings"/></svg>
      </button>
    </div>
    <p id="summary">…</p>
  </header>

  <div class="stack">
    <button class="action primary" data-action="groupTabs">
      <svg class="ico"><use href="#i-group"/></svg>
      <span class="label">Group tabs by topic</span>
    </button>

    <label class="switch">
      <svg class="ico"><use href="#i-windows"/></svg>
      <span class="label">Group across all windows</span>
      <input type="checkbox" id="acrossWindows" />
      <span class="track"><span class="thumb"></span></span>
    </label>

    <button class="action" data-action="sortTabs">
      <svg class="ico"><use href="#i-sort"/></svg>
      <span class="label">Sort related together</span>
    </button>
    <button class="action" data-action="dedupeTabs">
      <svg class="ico"><use href="#i-dedupe"/></svg>
      <span class="label">Close duplicate tabs</span>
    </button>
    <button class="action" data-action="saveSession">
      <svg class="ico"><use href="#i-save"/></svg>
      <span class="label">Save all tabs as a session</span>
    </button>
    <button class="action subtle" data-action="ungroupAll">
      <svg class="ico"><use href="#i-ungroup"/></svg>
      <span class="label">Ungroup all</span>
    </button>

    <label class="switch">
      <svg class="ico"><use href="#i-ai"/></svg>
      <span class="label">On-device AI for unknown tabs <span id="aiStatus" class="hint"></span></span>
      <input type="checkbox" id="useAi" />
      <span class="track"><span class="thumb"></span></span>
    </label>
    <button id="aiDownloadBtn" class="ghost-btn hidden">⬇ Download on-device AI model</button>
    <div id="aiProgress" class="aiprogress hidden"><span id="aiProgressBar"></span></div>
  </div>

  <div class="divider"></div>

  <div class="stack">
    <button class="action subtle" id="undoBtn" data-action="undo" disabled>
      <svg class="ico"><use href="#i-undo"/></svg>
      <span class="label">Undo last action</span>
    </button>
  </div>

  <p id="status" role="status"></p>

  <script type="module" src="popup.js"></script>
</body>
</html>
